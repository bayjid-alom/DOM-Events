<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        #hover-btn {
            width: 100%;
            max-width: 220px;
            font-size: 16px;
        }

        @media (max-width:480px) {
            #hover-btn {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div>
        <button id="hover-btn">Hover me</button>
    </div>


    <script>
        const hoverBtn = document.getElementById("hover-btn");

        hoverBtn.style.padding = "12px 25px";
        hoverBtn.style.color = "white";
        hoverBtn.style.border = "1px solid #1f2937";
        hoverBtn.style.borderRadius = "8px";
        hoverBtn.style.backgroundColor = "#1f2937";
        hoverBtn.style.transition = "0.3s ease";
        hoverBtn.style.cursor = "pointer";

        hoverBtn.addEventListener("mouseenter", function () {
            hoverBtn.style.backgroundColor = "#6366f1";
            hoverBtn.style.color = "white";
            hoverBtn.style.border = "1px solid #4f46e5";
            hoverBtn.style.transform = "scale(1.03)";
        });

        hoverBtn.addEventListener("mouseout", function () {
            hoverBtn.style.backgroundColor = "#1f2937";
            hoverBtn.style.color = "white";
            hoverBtn.style.border = "1px solid #1f2937";
            hoverBtn.style.transform = "scale(1)";
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            color: #222;
            line-height: 1.6;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #1B1464;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px;
            transition: .3s;
        }

        button:hover {
            background: #3129a0;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(.96);
        }

        button a {
            color: white;
            text-decoration: none;
        }

        .section-design {
            background: white;
            border: 1px solid #ddd;
            border-left: 6px solid #1B1464;
            border-radius: 12px;
            padding: 25px;
            margin-top: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
        }

        h1 {
            margin-bottom: 15px;
            color: #1B1464;
        }

        p {
            margin-bottom: 15px;
        }

        ul {
            padding-left: 22px;
        }

        li {
            margin: 8px 0;
        }

        /* Tablet */
        @media(max-width:768px) {

            body {
                padding: 15px;
            }

            button {
                width: calc(50% - 18px);
                margin: 8px;
            }
        }

        /* Mobile */
        @media(max-width:576px) {

            body {
                margin: 10px auto;
                padding: 12px;
            }

            button {
                width: 100%;
                margin: 8px 0;
            }

            .section-design {
                padding: 18px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>

</head>

<body id="body">

    <button onclick="makeBisque()">Make Bisque</button>
    <button id="make-blue">Make Blue</button>
    <button id="lightgreen-btn">Make lightgreen</button>

    <button id="make-li-blue">Li blue</button>

    <button id="count"> 0</button>
    <button><a href="../index.html">Back ↩️</a></button>


    <section id="players-section">
        <h1 class="players-headiing" id="heading"> Players Name :</h1>

    </section>









    <script>

        const makeLiBlue = document.getElementById("make-li-blue");
        makeLiBlue.onclick = function () {

            const allLi = document.getElementsByTagName("li");
            for (const li of allLi) {
                li.style.color = "blue"
            }
        }


        const countBtn = document.getElementById("count");
        let count = 0;
        countBtn.onclick = function () {
            count++;
            countBtn.innerText = count;
        }


        const playersSection = document.getElementById("players-section");
        const ul = document.createElement("ul");
        playersSection.appendChild(ul)

        ul.innerHTML = `
        <li>List item - 1</li>
    <li>List item - 2</li>
    <li>List item - 3</li>
    <li>List item - 4</li>
    <li>List item - 5</li>`



        const mainContainer = document.getElementById("body");
        const newSection = document.createElement("section")

        newSection.innerHTML = ` <h1>Book Lists</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Itaque harum neque sit nemo quam nam recusandae eos nostrum fugit accusantium?</p>

    <ul>
        <li>Book - 1</li>
        <li>Book - 2</li>
        <li>Book - 3</li>
        <li>Book - 4</li>
        <li>Book - 5</li>
    </ul>`

        mainContainer.appendChild(newSection)

        const allLi = document.getElementsByTagName("li");
        for (const li of allLi) {
            console.log(li)
            li.style.fontSize = "1.15em";
            li.style.color = "red"

        }

        const allSections = document.getElementsByTagName("section");
        for (const section of allSections) {
            section.classList.add("section-design");
        }


        const heading = document.getElementById("heading");
        console.log(heading.innerText)
        console.log(heading.classList)
        heading.innerText = "Cricketers Name :"




        function makeBisque() {
            document.body.style.backgroundColor = "bisque"
        }

        const btnMakeBlue = document.getElementById("make-blue");
        btnMakeBlue.onclick = function () {
            document.body.style.backgroundColor = "blue"
        }


        const btnLightGreen = document.getElementById("lightgreen-btn");
        btnLightGreen.onclick = function () {
            document.body.style.backgroundColor = "lightgreen"
        }

    </script>

</body>

</html>

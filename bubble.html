<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
            color: #222;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #1B1464;
        }

        section {
            background: #fff;
            border: 3px solid #ef4444;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
        }

        h3 {
            margin: 20px 0 15px;
            color: #1B1464;
        }

        ol {
            border: 3px solid #7c3aed;
            border-radius: 10px;
            padding: 20px 20px 20px 40px;
        }

        li {
            background: #eef4ff;
            border: 2px solid #2563eb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: .3s;
        }

        li:hover {
            background: #dbeafe;
            transform: translateX(5px);
        }

        img {
            display: block;
            width: 100%;
            max-width: 420px;
            margin: 0 auto 20px;
        }

        /* Tablet */
        @media (max-width:768px) {
            body {
                padding: 15px;
            }

            h1 {
                font-size: 28px;
            }
        }

        /* Mobile */
        @media (max-width:576px) {
            body {
                padding: 10px;
            }

            section,
            ol,
            li {
                padding: 15px;
            }

            ol {
                padding-left: 30px;
            }

            h1 {
                font-size: 24px;
            }

            h3 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body id="body">

    <h1>Explore Event bubble</h1>

    <section id="list-container">
        <img src="./images/bubble.svg" alt="">
        <h3>List of things!</h3>
        <!-- ul>li#item-$*6>lorem2 -->
        <ol id="item-list">
            <li id="item-1">Lorem, ipsum.</li>
            <li id="item-2">Dolorum, impedit?</li>
            <li id="item-3">Corrupti, modi.</li>
            <li id="item-4">Similique, consectetur?</li>
            <li id="item-5">Minima, sunt.</li>
            <li id="item-6">Illo, vero!</li>
        </ol>
    </section>



    <script>
        // item-2 handler
        // এখানে item-2 click করলে -- list-2,ol,section,body ক্লিক হয়ে যাচ্ছে।
        // to stop - parameter event then,
        document.getElementById("item-2")
            .addEventListener("click", function (event) {
                event.stopPropagation()
                event.stopImmediatePropagation()
                console.log("Item 2 clicked")
            })

        // item-2 second click
        document.getElementById("item-2")
            .addEventListener("click", function (event) {
                console.log("Item 2 second clicked")
            })


        // list-item handler
        document.getElementById("item-list")
            .addEventListener("click", function () {
                console.log("ol clicked")
            })


        // section
        document.getElementById("list-container")
            .addEventListener("click", function () {
                console.log("section clicked")
            })

        // body
        document.getElementById("body")
            .addEventListener("click", function () {
                console.log("body clicked")
            })
    </script>
</body>

</html>

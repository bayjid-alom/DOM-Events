<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delegate</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            max-width: 900px;
            margin: 30px auto;
            padding: 25px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            color: #222;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .1);
            border-radius: 16px;
        }

        h1 {
            text-align: center;
            color: #1B1464;
            margin-bottom: 25px;
        }

        section {
            margin-top: 35px;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .08);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #1B1464;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            margin-bottom: 20px;
        }

        button:hover {
            background: #3129a0;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(.97);
        }

        ol,
        ul {
            margin-left: 20px;
        }

        li {
            background: #eef4ff;
            border: 1px solid #c7d2fe;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            cursor: pointer;
            transition: .3s;
        }

        li:hover {
            background: #dbeafe;
            transform: translateX(6px);
        }

        @media (max-width:768px) {

            body {
                margin: 15px;
                padding: 20px;
            }
        }

        @media (max-width:576px) {

            body {
                margin: 10px;
                padding: 15px;
            }

            h1 {
                font-size: 24px;
            }

            button {
                width: 100%;
            }

            li {
                font-size: 15px;
            }
        }
    </style>
    
</head>

<body>



    <h1>Explore the concept of Event Delegate</h1>
    <!-- ol#item-list>li.item*6{My awesome item -$} -->
    <button id="btn-add-item">Add new item</button>
    <ol id="item-list">
        <li class="item">My awesome item -1</li>
        <li class="item">My awesome item -2</li>
        <li class="item">My awesome item -3</li>
        <li class="item">My awesome item -4</li>
        <li class="item">My awesome item -5</li>
        <li class="item">My awesome item -6</li>
    </ol>


    <script>

        // লুপ না করে ......
        // const items = document.getElementsByClassName("item");
        // for (const item of items) {
        //     item.addEventListener('click', function (event) {
        //         // console.log(event.target.parentNode.parentNode)
        //         event.target.parentNode.removeChild(event.target)
        //     })
        // }


        // পেরেন্টে এড করবো delegate
        document.getElementById("item-list").addEventListener("click", function (event) {
            // console.log(event.target)
            event.target.parentNode.removeChild(event.target)
        })

        // add a new item;
        document.getElementById("btn-add-item").addEventListener("click", function () {
            const ol = document.getElementById("item-list");
            const li = document.createElement("li");
            li.innerText = "New item";

            li.classList.add("item")
            ol.appendChild(li)
        })
    </script>



    <section>
        <button id="add-btn">আইটেম যোগ করুন</button>
        <ul id="list">
            <li>unordered item -1</li>
            <li>unordered item -2</li>
            <li>unordered item -3</li>
            <li>unordered item -4</li>
            <li>unordered item -5</li>
        </ul>
    </section>

    <script>
        document.getElementById("list").addEventListener("click", function (event) {
            event.target.parentNode.removeChild(event.target)
        })

        document.getElementById("add-btn").addEventListener("click", function (event) {
            const listCon = document.getElementById('list');
            const itemElement = document.createElement("li");
            itemElement.innerText = "নতুন আইটেম"
            listCon.appendChild(itemElement)
        })

    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handler</title>
    <style>
        body {
            margin: 22px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #1b1464b0;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1B1464;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }


        .section-design {
            border: 2px solid #1B1464;
            padding: 20px;
            background-color: lightblue;
            margin-bottom: 20px;
            border-radius: 13px;
        }

        input {
            padding: 10px 20px;
            border: 1px solid black;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>

<body>

    <h1 id="title-text">Event Handler </h1>
    <button id="btn-update-title">Update title</button>
    <br>
    <hr>

    <p id="user-info">No User</p>
    <button id="btn-login">Login</button>
    <br>
    <hr>

    <!-- Handle input text -->
    <p id="name">No name</p>
    <input id="input-name" type="text" placeholder="Your name...">
    <button id="btn-update">Update</button>
    <br>
    <hr>

    <p id="email-name">There is no email..!</p>
    <input id="email-text" type="email" placeholder="Your email....">
    <button id="email-add-btn">Email Add</button>



    <script>

    </script>

    <script src="./script/02_handler.js"></script>
</body>

</html>

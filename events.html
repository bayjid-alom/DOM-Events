<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f8f9fc;
        }

        h1 {
            text-align: center;
            color: #1B1464;
            margin-bottom: 30px;
        }

        hr {
            margin: 25px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        p {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #bbb;
            border-radius: 8px;
            font-size: 16px;
            margin: 12px 0;
            transition: .3s;
        }

        input:focus {
            outline: none;
            border-color: #1B1464;
            box-shadow: 0 0 6px rgba(27, 20, 100, .25);
        }

        button {
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            background: #1B1464;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            transition: .3s;
        }

        button:hover {
            background: #3429c7;
        }

        button:active {
            transform: scale(.98);
        }

        @media(max-width:576px) {

            body {
                margin: 15px;
                padding: 15px;
            }

            button {
                width: 100%;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <h1 id="title-text">Event Handler </h1>
    <button id="btn-update-title">Update title</button>
    <br>
    <hr>

    <p id="user-info">No User</p>
    <button id="btn-login">Login</button>
    <br>
    <hr>

    <!-- Handle input text -->
    <p id="name">No name</p>
    <input id="input-name" type="text" placeholder="Your name...">
    <button id="btn-update">Update</button>
    <br>
    <hr>

    <p id="email-name">There is no email..!</p>
    <input id="email-text" type="email" placeholder="Your email....">
    <button id="email-add-btn">Email Add</button>



    <script>

    </script>

    <script src="./script/02_handler.js"></script>
</body>

</html>

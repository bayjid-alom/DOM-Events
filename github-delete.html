<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Delete</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6fb;
            max-width: 850px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
            border-left: 6px solid #dc2626;
        }

        .card:nth-child(2) {
            border-left-color: #2563eb;
        }

        h1,
        h2 {
            margin-bottom: 18px;
            color: #1f2937;
        }

        .info {
            color: #6b7280;
            margin-bottom: 18px;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #d1d5db;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: .3s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37, 99, 235, .2);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        button:disabled {
            background: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
        }

        #btn-delete {
            background: #dc2626;
            color: white;
        }

        #btn-delete:not(:disabled):hover {
            background: #b91c1c;
        }

        #btn-remove {
            background: #2563eb;
            color: white;
        }

        #btn-remove:not(:disabled):hover {
            background: #1d4ed8;
        }

        @media(max-width:600px) {

            body {
                margin: 15px;
                padding: 10px;
            }

            .card {
                padding: 20px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- বাটন প্রথমে ডিজেবলড অবস্থায় থাকবে, যখন "ডিলেট" লেখা হবে তখন এনাবল হবে । -->

    <h1 id="secret-info">My secret info</h1>
    <input id="input-delete" placeholder="write delete" type="text">
    <button id="btn-delete" disabled>Delete</button>



    <h2 id="not-hide">Not hide</h2>
    <input id="input-email" placeholder="write bayjid@gmail.com" type="email">
    <button id="btn-remove" disabled>Remove</button>



    <script>

        document.getElementById("input-email").addEventListener("keyup", function (event) {
            const text = event.target.value;
            const btnRemove = document.getElementById("btn-remove");


            if (text === "bayjid@gmail.com") {
                btnRemove.removeAttribute("disabled");
                const notHide = document.getElementById("not-hide");
                notHide.style.display = "none";

                // btnRemove.addEventListener("click", function () {
                //     notHide.innerText = "Successfully works!"
                //     notHide.style.color = "blue";
                // })

            }
            else {
                btnRemove.setAttribute("disabled", true)
            }

        })





        document.getElementById("input-delete")
            .addEventListener("keyup", function (event) {
                const text = event.target.value;
                const btnDelete = document.getElementById("btn-delete");

                if (text === "delete") {
                    btnDelete.removeAttribute("disabled")
                    const scretTag = document.getElementById("secret-info");
                    scretTag.style.display = 'none';
                }
                else {
                    btnDelete.setAttribute("disabled", true)
                }
            })

    </script>
</body>

</html>

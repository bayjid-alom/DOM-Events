<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Events</title>
    <style>
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #1b1464b0;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1B1464;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        input {
            padding: 10px 20px;
            border: 1px solid black;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .pages a {
            display: inline-block;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .pages {
            padding: 20px;
        }

        .pages h2 {
            margin: 15px 0 10px;
        }

        .pages a {
            display: inline-block;
            text-decoration: none;
            color: black;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .pages a:hover {
            background: #f3f3f3;
        }
    </style>
</head>

<body>

    <section class="pages">
        <h2>Exercise Pages :</h2>
        <a href="Exercise/practice-dom.html">DOM Exercise</a> <br>
        <a href="Exercise/hover.html">Mouse Events</a> <br>
        <a href="Exercise/text-change.html">Text Change (3 Elemnets)</a>

        <h2>Same Path Pages :</h2>
        <a href="events.html">Events.html</a>
    </section>

    <br><br>
    <hr>

    <h1>DOM Events</h1>
    <!-- Option 01 for event handler -->
    <button onclick="console.log(7)">Click me</button>
    <button onclick="console.log(69)">Another button</button>

    <!-- Single quote -->
    <button onclick="console.log('Hello brother!')">Third button</button>
    <input placeholder="Your name..." type="text">

    <br><br>
    <hr>

    <!-- Option 02 for event handler (function)-->
    <h2>Option 02 :</h2>
    <button onclick="makeYellow()">Make Yellow</button>
    <button onclick="makeRed()">Make Red</button>
    <button onclick="makeBisque()">Make Bisque</button>
    <button onclick="makeBlueMartina()">Blue Martina</button>
    <button onclick="makeEnergos()">Make Energos</button>

    <!-- Another ways --> <br><br>
    <hr>
    <h2>Another Ways :</h2>
    <button id="btn-make-old-gera">Make Old Gera</button>

    <!-- Not used way -->
    <button id="btn-make-purple">Make Purple</button>


    <!-- Option - 04 -->

    <button id="make-green-btn">Make Green</button>
    <button id="make-gold-btn">Make Gold</button>

    <button id="box">Hover me</button>




    <!--🟢 internal javascript -->
    <script>

        const hoverBtn = document.getElementById("box");

        hoverBtn.style.padding = "12px 25px";
        hoverBtn.style.border = "1px solid gray";
        hoverBtn.style.backgroundColor = "#f8fafc";
        hoverBtn.style.color = "#0f172a";
        hoverBtn.style.borderRadius = "10px";
        hoverBtn.style.transition = "0.3s ease";

        hoverBtn.addEventListener('mouseenter', function () {
            hoverBtn.style.backgroundColor = "#3b82f6";
            hoverBtn.style.color = "white";
            hoverBtn.style.border = "1px solid #2563eb";
            hoverBtn.style.transform = "scale(0.98)";
        });

        hoverBtn.addEventListener("mouseout", function () {
            hoverBtn.style.backgroundColor = "#f8fafc";
            hoverBtn.style.color = "#0f172a";
            hoverBtn.style.border = "1px solid #e5e7eb";
            hoverBtn.style.transform = "scale(1)";
        });








        // addEventListener('event type', handler) 🔥
        const btnGreen = document.getElementById("make-green-btn");
        btnGreen.addEventListener('click', function makeGreen() {
            document.body.style.backgroundColor = "green";
        })

        document.getElementById("make-gold-btn")
            .addEventListener('click', function makeGold() {
                document.body.style.backgroundColor = 'gold';
            })




        // Way - 01
        // <button onclick="console.log(7)">Click me</button>

        // Way - 03
        function makeYellow() {
            document.body.style.backgroundColor = "yellow";
        }

        // way - 03
        const makeOldGera = document.getElementById("btn-make-old-gera");
        makeOldGera.onclick = function makeOldGera() {
            document.body.style.backgroundColor = "#cf6a87";
        }

        // way- 04 (Not used)
        const btnMakePurple = document.getElementById("btn-make-purple");
        btnMakePurple.onclick = makePurple;  // Not Call


        function makePurple() {
            document.body.style.backgroundColor = "purple";
        }

    </script>



    <!--🟢 external javascript -->
    <script src="./script/01_events.js"></script>

</body>

</html>

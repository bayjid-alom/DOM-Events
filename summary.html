<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Events summary</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        section {
            width: 100%;
            max-width: 550px;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #1f2937;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 18px;
            transition: .3s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .15);
        }

        button {
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            color: white;
            background: #2563eb;
            transition: .3s;
            margin-right: 10px;
            margin-bottom: 20px;
        }

        button:hover {
            background: #1d4ed8;
        }

        #name-container {
            margin-top: 10px;
        }

        #name-container p {
            background: #f8fafc;
            border-left: 5px solid #2563eb;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .08);
            font-size: 16px;
            color: #374151;
            word-break: break-word;
        }

        @media (max-width: 600px) {
            section {
                padding: 20px;
            }

            button {
                width: 100%;
                margin-right: 0;
            }
        }
    </style>

</head>

<body>

    <section>
        <h1>DOM Events Summary</h1>
        <input id="name-input" type="text" placeholder="Your name...">
        <button onclick="addName()">Add Name</button>
        <button id="btn-add-name">নাম যোগ করুন </button>

        <div id="name-container">
            <!-- Users will be added -->
        </div>
    </section>


    <script>
        // function callback (Sometimes used)
        function addName() {
            const nameInput = document.getElementById("name-input");
            const name = nameInput.value;

            const nameContainer = document.getElementById("name-container");
            const p = document.createElement("p");
            p.innerText = name;

            nameContainer.appendChild(p)
            nameInput.value = "";
        }


        // addEventListener (best practice)
        document.getElementById("btn-add-name").addEventListener("click", function () {
            const nameInput = document.getElementById("name-input");
            const name = nameInput.value;

            const nameContainer = document.getElementById("name-container");
            const nameElement = document.createElement("p");
            nameElement.innerText = name;

            nameContainer.appendChild(nameElement)
            nameInput.value = ""
        })

    </script>
</body>

</html>
